services:
  - type: web
    name: aetherlight-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_BASE_URL
        sync: false
      - key: CLOUD_MODEL
        sync: false
      - key: BACKEND_HOST
        value: "0.0.0.0"