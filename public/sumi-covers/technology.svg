  <!-- 近山 -->
  <path d="M 0 552 Q 28.57142857142857 534 85.71428571428571 514 T 171.42857142857142 534 Q 199.99999999999997 499 257.1428571428571 479 T 342.85714285714283 499 Q 371.42857142857144 524 428.57142857142856 504 T 514.2857142857142 524 Q 542.8571428571429 489 600 469 T 685.7142857142857 489 Q 714.2857142857142 515 771.4285714285713 495 T 857.142857142857 515 Q 885.7142857142857 540 942.8571428571428 520 T 1028.5714285714284 540 Q 1057.142857142857 505 1114.2857142857142 485 T 1200 505 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g transform="translate(600, 450)" opacity="0.55">
        <circle cx="0" cy="0" r="80" fill="#e8dcc0" stroke="#3a3a3a" stroke-width="2"/>
        <circle cx="0" cy="0" r="65" fill="none" stroke="#3a3a3a" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="6" fill="#c43a30"/>
        <line x1="0" y1="-70" x2="0" y2="70" stroke="#1a1a1a" stroke-width="1.5"/>
        <line x1="-70" y1="0" x2="70" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
        <text x="0" y="-50" font-family="'KaiTi',serif" font-size="14" fill="#c43a30" text-anchor="middle">南</text>
        <text x="0" y="62" font-family="'KaiTi',serif" font-size="14" fill="#3a3a3a" text-anchor="middle">北</text>
        <text x="-58" y="6" font-family="'KaiTi',serif" font-size="14" fill="#3a3a3a" text-anchor="middle">西</text>
        <text x="58" y="6" font-family="'KaiTi',serif" font-size="14" fill="#3a3a3a" text-anchor="middle">东</text>
      </g>

  <!-- 飞鸟 -->
  <path d="M 668 186 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 332 127 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 796 69 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 382 619 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="432" y1="619" x2="432" y2="587" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">技</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">古 技</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>