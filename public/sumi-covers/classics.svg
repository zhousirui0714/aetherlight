<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="53"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="70"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 358 Q 40 337 120 317 T 240 337 Q 280 338 360 318 T 480 338 Q 520 339 600 319 T 720 339 Q 760 339 840 319 T 960 339 Q 1000 340 1080 320 T 1200 340 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 453 Q 40 432 120 412 T 240 432 Q 280 433 360 413 T 480 433 Q 520 434 600 414 T 720 434 Q 760 434 840 414 T 960 434 Q 1000 435 1080 415 T 1200 435 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 550 Q 40 529 120 509 T 240 529 Q 280 530 360 510 T 480 530 Q 520 531 600 511 T 720 531 Q 760 531 840 511 T 960 531 Q 1000 532 1080 512 T 1200 532 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g transform="translate(420, 460)" opacity="0.45">
        <path d="M 0 30 Q 0 0 30 0 L 330 0 Q 360 0 360 30 L 360 80 Q 360 100 330 100 L 30 100 Q 0 100 0 80 Z" fill="#e8dcc0" stroke="#3a3a3a" stroke-width="1.2"/>
        <line x1="40" y1="30" x2="320" y2="30" stroke="#3a3a3a" stroke-width="0.6" opacity="0.5"/>
        <line x1="40" y1="50" x2="320" y2="50" stroke="#3a3a3a" stroke-width="0.6" opacity="0.5"/>
        <line x1="40" y1="70" x2="320" y2="70" stroke="#3a3a3a" stroke-width="0.6" opacity="0.5"/>
        <line x1="40" y1="90" x2="320" y2="90" stroke="#3a3a3a" stroke-width="0.6" opacity="0.5"/>
      </g>

  <!-- 飞鸟 -->
  <path d="M 940 181 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 928 179 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 916 176 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 904 174 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 376 638 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="426" y1="638" x2="426" y2="606" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">典</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">经 典</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>