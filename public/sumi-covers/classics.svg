<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 宣纸米黄底 -->
  <rect width="1200" height="800" fill="#f4ecdc"/>

  <!-- 纸纹噪点 (模拟宣纸纤维) -->
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="53"/>
      <feColorMatrix values="0 0 0 0 0.85
                              0 0 0 0 0.78
                              0 0 0 0 0.65
                              0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="70"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 (最淡) -->
  <path d="M 0 354 Q 0 287 120 267 T 240 287 Q 240 296 360 276 T 480 296 Q 480 305 600 285 T 720 305 Q 720 314 840 294 T 960 314 Q 960 323 1080 303 T 1200 323 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 451 Q 50 410 150 395 T 250 410 Q 350 416 450 401 T 550 416 Q 650 422 750 407 T 850 422 Q 950 428 1050 413 T 1150 428 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 (最浓) -->
  <path d="M 0 553 Q 66.66666666666666 532 200 522 T 333.33333333333337 532 Q 466.66666666666663 536 600 526 T 733.3333333333334 536 Q 866.6666666666666 540 1000 530 T 1133.3333333333333 540 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 飞鸟 -->
  <path d="M 725 145 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 650 130 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 1075 115 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 440 645 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
  <line x1="490" y1="645" x2="490" y2="613" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 (category 印文) -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">典</text>
  </g>

  <!-- 左侧题款 category 标签 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">经 典</text>
  </g>

  <!-- 底部朱砂小印 "溯光" -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>