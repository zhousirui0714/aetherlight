<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="92"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="9"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 358 Q 33.33333333333333 304 100 284 T 200 304 Q 233.33333333333331 331 300 311 T 400 331 Q 433.3333333333333 299 500 279 T 600 299 Q 633.3333333333334 327 700 307 T 800 327 Q 833.3333333333334 294 900 274 T 1000 294 Q 1033.3333333333333 322 1100 302 T 1200 322 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 479 Q 33.33333333333333 425 100 405 T 200 425 Q 233.33333333333331 452 300 432 T 400 452 Q 433.3333333333333 420 500 400 T 600 420 Q 633.3333333333334 448 700 428 T 800 448 Q 833.3333333333334 415 900 395 T 1000 415 Q 1033.3333333333333 443 1100 423 T 1200 443 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 554 Q 33.33333333333333 500 100 480 T 200 500 Q 233.33333333333331 527 300 507 T 400 527 Q 433.3333333333333 495 500 475 T 600 495 Q 633.3333333333334 523 700 503 T 800 523 Q 833.3333333333334 490 900 470 T 1000 490 Q 1033.3333333333333 518 1100 498 T 1200 518 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  

  <!-- 飞鸟 -->
  <path d="M 572 147 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 204 83 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 636 158 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 268 94 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 190 643 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="240" y1="643" x2="240" y2="611" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">诗</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">诗 词</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>