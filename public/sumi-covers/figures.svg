<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 宣纸米黄底 -->
  <rect width="1200" height="800" fill="#f4ecdc"/>

  <!-- 纸纹噪点 (模拟宣纸纤维) -->
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="57"/>
      <feColorMatrix values="0 0 0 0 0.85
                              0 0 0 0 0.78
                              0 0 0 0 0.65
                              0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="74"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 (最淡) -->
  <path d="M 0 362 Q 0 295 100 275 T 200 295 Q 200 316 300 296 T 400 316 Q 400 337 500 317 T 600 337 Q 600 298 700 278 T 800 298 Q 800 319 900 299 T 1000 319 Q 1000 340 1100 320 T 1200 340 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 475 Q 50 450 150 435 T 250 450 Q 350 464 450 449 T 550 464 Q 650 438 750 423 T 850 438 Q 950 452 1050 437 T 1150 452 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 (最浓) -->
  <path d="M 0 565 Q 66.66666666666666 564 200 554 T 333.33333333333337 564 Q 466.66666666666663 548 600 538 T 733.3333333333334 548 Q 866.6666666666666 557 1000 547 T 1133.3333333333333 557 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 飞鸟 -->
  <path d="M 925 105 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 750 170 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 1075 135 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 280 609 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
  <line x1="330" y1="609" x2="330" y2="577" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 (category 印文) -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">人</text>
  </g>

  <!-- 左侧题款 category 标签 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">人 物</text>
  </g>

  <!-- 底部朱砂小印 "溯光" -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>