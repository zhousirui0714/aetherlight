<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="57"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="74"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 371 Q 40 302 120 282 T 240 302 Q 280 334 360 314 T 480 334 Q 520 306 600 286 T 720 306 Q 760 338 840 318 T 960 338 Q 1000 310 1080 290 T 1200 310 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 473 Q 40 404 120 384 T 240 404 Q 280 436 360 416 T 480 436 Q 520 408 600 388 T 720 408 Q 760 440 840 420 T 960 440 Q 1000 412 1080 392 T 1200 412 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 561 Q 40 492 120 472 T 240 492 Q 280 524 360 504 T 480 524 Q 520 496 600 476 T 720 496 Q 760 528 840 508 T 960 528 Q 1000 500 1080 480 T 1200 500 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g transform="translate(510, 380)" opacity="0.55">
        <path d="M 0 30 L 90 0 L 180 30 L 180 90 L 0 90 Z" fill="#3a3a3a" opacity="0.3"/>
        <line x1="0" y1="30" x2="180" y2="30" stroke="#1a1a1a" stroke-width="2"/>
        <rect x="20" y="30" width="40" height="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
        <rect x="80" y="30" width="40" height="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
        <rect x="140" y="30" width="20" height="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      </g>

  <!-- 飞鸟 -->
  <path d="M 492 91 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 864 156 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 436 81 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 808 146 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 280 600 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="330" y1="600" x2="330" y2="568" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">人</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">人 物</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>