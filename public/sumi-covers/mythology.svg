<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="21"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 356 Q 40 338 120 318 T 240 338 Q 280 339 360 319 T 480 339 Q 520 340 600 320 T 720 340 Q 760 341 840 321 T 960 341 Q 1000 343 1080 323 T 1200 343 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 450 Q 40 432 120 412 T 240 432 Q 280 433 360 413 T 480 433 Q 520 434 600 414 T 720 434 Q 760 435 840 415 T 960 435 Q 1000 437 1080 417 T 1200 437 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 568 Q 40 550 120 530 T 240 550 Q 280 551 360 531 T 480 551 Q 520 552 600 532 T 720 552 Q 760 553 840 533 T 960 553 Q 1000 555 1080 535 T 1200 555 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g opacity="0.5">
        <circle cx="1020" cy="180" r="60" fill="#e8dcc0" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
        <circle cx="1020" cy="180" r="60" fill="none" stroke="#c43a30" stroke-width="0.5" opacity="0.4"/>
        <path d="M 920 200 q 30 -30 80 -20 q 50 10 80 0" stroke="#3a3a3a" stroke-width="2" fill="none" opacity="0.5"/>
        <path d="M 880 250 q 40 -20 100 -10" stroke="#3a3a3a" stroke-width="2" fill="none" opacity="0.5"/>
      </g>

  <!-- 飞鸟 -->
  <path d="M 828 158 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 812 155 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 796 153 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 780 150 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 302 629 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="352" y1="629" x2="352" y2="597" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">神</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">神 话</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>