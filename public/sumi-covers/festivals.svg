<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="77"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="94"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 375 Q 40 306 120 286 T 240 306 Q 280 344 360 324 T 480 344 Q 520 322 600 302 T 720 322 Q 760 360 840 340 T 960 360 Q 1000 338 1080 318 T 1200 338 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 455 Q 40 386 120 366 T 240 386 Q 280 424 360 404 T 480 424 Q 520 402 600 382 T 720 402 Q 760 440 840 420 T 960 440 Q 1000 418 1080 398 T 1200 418 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 557 Q 40 488 120 468 T 240 488 Q 280 526 360 506 T 480 526 Q 520 504 600 484 T 720 504 Q 760 542 840 522 T 960 542 Q 1000 520 1080 500 T 1200 520 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g opacity="0.55">
        
        <g transform="translate(250, 100)">
          <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1a" stroke-width="1.2"/>
          <ellipse cx="0" cy="65" rx="22" ry="30" fill="#c43a30" opacity="0.7"/>
          <line x1="-22" y1="65" x2="22" y2="65" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="35" x2="0" y2="40" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="90" x2="0" y2="95" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <path d="M -5 95 q 5 15 0 25" stroke="#c43a30" stroke-width="1.5" fill="none" opacity="0.7"/>
        </g>
        <g transform="translate(470, 100)">
          <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1a" stroke-width="1.2"/>
          <ellipse cx="0" cy="65" rx="22" ry="30" fill="#c43a30" opacity="0.7"/>
          <line x1="-22" y1="65" x2="22" y2="65" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="35" x2="0" y2="40" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="90" x2="0" y2="95" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <path d="M -5 95 q 5 15 0 25" stroke="#c43a30" stroke-width="1.5" fill="none" opacity="0.7"/>
        </g>
        <g transform="translate(690, 100)">
          <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1a" stroke-width="1.2"/>
          <ellipse cx="0" cy="65" rx="22" ry="30" fill="#c43a30" opacity="0.7"/>
          <line x1="-22" y1="65" x2="22" y2="65" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="35" x2="0" y2="40" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <line x1="0" y1="90" x2="0" y2="95" stroke="#8a2820" stroke-width="0.8" opacity="0.6"/>
          <path d="M -5 95 q 5 15 0 25" stroke="#c43a30" stroke-width="1.5" fill="none" opacity="0.7"/>
        </g>
      </g>

  <!-- 飞鸟 -->
  <path d="M 651 63 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 944 114 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 436 165 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 400 610 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="450" y1="610" x2="450" y2="578" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">节</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">节 令</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>