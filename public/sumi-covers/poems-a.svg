  <path d="M 0 558 Q 28.57142857142857 498 85.71428571428571 478 T 171.42857142857142 498 Q 199.99999999999997 495 257.1428571428571 475 T 342.85714285714283 495 Q 371.42857142857144 492 428.57142857142856 472 T 514.2857142857142 492 Q 542.8571428571429 489 600 469 T 685.7142857142857 489 Q 714.2857142857142 546 771.4285714285713 526 T 857.142857142857 546 Q 885.7142857142857 543 942.8571428571428 523 T 1028.5714285714284 543 Q 1057.142857142857 540 1114.2857142857142 520 T 1200 540 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  

  <!-- 飞鸟 -->
  <path d="M 796 192 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 836 199 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 876 66 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 916 73 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 138 612 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="188" y1="612" x2="188" y2="580" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">诗</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
