<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.08 0"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="20"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f4ecdc"/>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 -->
  <path d="M 0 368 Q 40 317 120 297 T 240 317 Q 280 303 360 283 T 480 303 Q 520 349 600 329 T 720 349 Q 760 334 840 314 T 960 334 Q 1000 320 1080 300 T 1200 320 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 453 Q 40 402 120 382 T 240 402 Q 280 388 360 368 T 480 388 Q 520 434 600 414 T 720 434 Q 760 419 840 399 T 960 419 Q 1000 405 1080 385 T 1200 405 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 -->
  <path d="M 0 560 Q 40 509 120 489 T 240 509 Q 280 495 360 475 T 480 495 Q 520 541 600 521 T 720 541 Q 760 526 840 506 T 960 526 Q 1000 512 1080 492 T 1200 512 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 主题元素 (在山前, 水墨淡) -->
  <g transform="translate(1000, 200)" opacity="0.5">
        <line x1="0" y1="0" x2="0" y2="380" stroke="#2a4a2a" stroke-width="6" stroke-linecap="round"/>
        <line x1="30" y1="0" x2="30" y2="350" stroke="#2a4a2a" stroke-width="5" stroke-linecap="round"/>
        <line x1="60" y1="0" x2="60" y2="320" stroke="#2a4a2a" stroke-width="4" stroke-linecap="round"/>
        
        <path d="M 0 80 q -40 -10 -60 -40" stroke="#3a5a3a" stroke-width="2" fill="none"/>
        <path d="M 0 130 q 50 -20 70 -10" stroke="#3a5a3a" stroke-width="2" fill="none"/>
        <path d="M 30 120 q -40 -10 -60 -40" stroke="#3a5a3a" stroke-width="2" fill="none"/>
        <path d="M 30 170 q 50 -20 70 -10" stroke="#3a5a3a" stroke-width="2" fill="none"/>
        <path d="M 60 160 q -40 -10 -60 -40" stroke="#3a5a3a" stroke-width="2" fill="none"/>
        <path d="M 60 210 q 50 -20 70 -10" stroke="#3a5a3a" stroke-width="2" fill="none"/>
      </g>

  <!-- 飞鸟 -->
  <path d="M 940 181 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 328 74 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 516 106 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 704 139 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 76 613 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
<line x1="126" y1="613" x2="126" y2="581" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">哲</text>
  </g>

  <!-- 左侧题款 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">哲 思</text>
  </g>

  <!-- 底部溯光印 -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>