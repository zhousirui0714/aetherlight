<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <!-- 宣纸米黄底 -->
  <rect width="1200" height="800" fill="#f4ecdc"/>

  <!-- 纸纹噪点 (模拟宣纸纤维) -->
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.85
                              0 0 0 0 0.78
                              0 0 0 0 0.65
                              0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="20"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#f4ecdc" filter="url(#paper)"/>

  <!-- 远山 (最淡) -->
  <path d="M 0 374 Q 0 307 120 287 T 240 307 Q 240 346 360 326 T 480 346 Q 480 325 600 305 T 720 325 Q 720 364 840 344 T 960 364 Q 960 343 1080 323 T 1200 343 L 1200 800 L 0 800 Z" fill="#3a3a3a" opacity="0.18" filter="url(#ink)"/>
  <!-- 中山 -->
  <path d="M 0 451 Q 33.33333333333333 430 100 415 T 166.66666666666669 430 Q 233.33333333333331 416 300 401 T 366.6666666666667 416 Q 433.3333333333333 442 500 427 T 566.6666666666666 442 Q 633.3333333333334 428 700 413 T 766.6666666666666 428 Q 833.3333333333334 414 900 399 T 966.6666666666666 414 Q 1033.3333333333333 440 1100 425 T 1166.6666666666667 440 L 1200 800 L 0 800 Z" fill="#2a2a2a" opacity="0.30" filter="url(#ink)"/>
  <!-- 近山 (最浓) -->
  <path d="M 0 553 Q 50 532 150 522 T 250 532 Q 350 548 450 538 T 550 548 Q 650 540 750 530 T 850 540 Q 950 531 1050 521 T 1150 531 L 1200 800 L 0 800 Z" fill="#1a1a1a" opacity="0.45" filter="url(#ink)"/>

  <!-- 飞鸟 -->
  <path d="M 725 145 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 900 80 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 1075 115 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>
  <path d="M 750 150 q 8 -6 16 0 m -16 0 q 8 6 16 0" stroke="#1a1a1a" stroke-width="1.8" fill="none" opacity="0.55"/>

  <!-- 小舟 -->
  <path d="M 240 645 q 50 -10 100 0 z" fill="#1a1a1a" opacity="0.65"/>
  <line x1="290" y1="645" x2="290" y2="613" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>

  <!-- 右侧朱砂方印 (category 印文) -->
  <g transform="translate(1070, 90)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#c43a30" stroke-width="3" rx="2"/>
    <text x="35" y="48" font-family="'KaiTi','STKaiti',serif" font-size="36" fill="#c43a30" text-anchor="middle" font-weight="bold">哲</text>
  </g>

  <!-- 左侧题款 category 标签 -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="'KaiTi','STKaiti',serif" font-size="14" fill="#3a3a3a" letter-spacing="6" opacity="0.7">溯　光</text>
    <line x1="0" y1="14" x2="60" y2="14" stroke="#3a3a3a" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="36" font-family="'KaiTi','STKaiti',serif" font-size="22" fill="#1a1a1a" letter-spacing="8" opacity="0.85">哲 思</text>
  </g>

  <!-- 底部朱砂小印 "溯光" -->
  <g transform="translate(80, 730)">
    <rect x="0" y="0" width="44" height="44" fill="#c43a30" rx="1"/>
    <text x="22" y="30" font-family="'KaiTi','STKaiti',serif" font-size="18" fill="#faf5e8" text-anchor="middle" font-weight="bold">溯光</text>
  </g>
</svg>